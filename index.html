<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Flyer PRO</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
  body{font-family:Arial;background:#111;color:white;text-align:center;}
  select,input{padding:8px;margin:5px;}
  button{padding:10px;margin:10px;background:red;color:white;border:none;cursor:pointer;}
  button.secondary{background:#333;}
  button.warn{background:#b00020;}

  #flyer{width:420px;margin:auto;background:#0a0a0a;}
  .header{padding:20px;border-bottom:3px solid red;}
  .section{margin:15px;padding:10px;background:#111;border-radius:20px;}

  .match{
    background:#f2f2f2;color:black;margin:10px;padding:10px;border-radius:15px;
    display:flex;justify-content:space-between;align-items:center;gap:8px;
  }

  .team{width:30%;text-align:center;font-weight:bold;}
  .team img{width:45px;height:45px;object-fit:contain;}

  .center{text-align:center;min-width:90px;}
  .time{background:red;color:white;padding:4px 8px;border-radius:8px;display:inline-block;}
  .vs{background:black;color:white;padding:4px 8px;border-radius:5px;margin-top:3px;display:inline-block;}

  .channels{display:flex;flex-wrap:wrap;justify-content:center;gap:4px;max-width:140px;}
  .channels img{width:35px;object-fit:contain;background:white;border-radius:6px;padding:2px;}

  .actions{display:flex;flex-direction:column;gap:6px;}
  .actions button{margin:0;padding:6px 8px;font-size:12px;background:#222;color:white;}
  .actions .del{background:#b00020;}
  .actions .edit{background:#0f4c81;}

  .footer{margin:20px;padding:15px;border:2px solid red;}

  .toolbar{max-width:980px;margin:0 auto 10px auto;}
  .hint{font-size:12px;opacity:.85}

  .channel-pick{
    display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:6px;
    font-size:14px;
  }
</style>
</head>

<body>
<h2>GENERADOR PRO</h2>

<div class="toolbar">
  <!-- 1) COMPETENCIA -->
  <select id="competition">
    <option value="lpf">LPF Argentina</option>
    <option value="lib">CONMEBOL Libertadores</option>
    <option value="sud">CONMEBOL Sudamericana</option>
  </select>

  <!-- 2) EQUIPOS -->
  <select id="team1"></select>
  <select id="team2"></select>

  <!-- 3) CANALES (MULTI) -->
  <div class="channel-pick">
    <label><input type="checkbox" value="ESPNP"> ESPN Premium</label>
    <label><input type="checkbox" value="TNTP"> TNT Sports Premium</label>
    <label><input type="checkbox" value="FOX"> FOX Sports</label>
    <label><input type="checkbox" value="TYC"> TyC Sports</label>
    <label><input type="checkbox" value="TELEFE"> Telefe</label>
    <label><input type="checkbox" value="DISNEY"> Disney+</label>
    <label><input type="checkbox" value="ESPN"> ESPN</label>
    <label><input type="checkbox" value="ESPN2"> ESPN 2</label>
    <label><input type="checkbox" value="DSPORTS"> DSPORTS</label>
    <label><input type="checkbox" value="DSPORTS2"> DSPORTS 2</label>
  </div>

  <!-- 4) HORA -->
  <input id="time" placeholder="Hora (19:00)" inputmode="numeric" />

  <div class="hint">
    Hora válida: 19:00 (también acepta 1900 o 19.00). Elegí al menos 1 canal.
  </div>

  <br>
  <button onclick="agregarDesdeFormulario()">Agregar</button>
  <button class="secondary" onclick="limpiarFormulario()">Limpiar formulario</button>
  <button class="warn" onclick="limpiarTodo()">Limpiar todo</button>
  <button onclick="descargar()">Descargar</button>
</div>

<!-- FLYER -->
<div id="flyer">
  <div class="header">
    <h2>TV DIGITAL</h2>
    <div>PARTIDOS DE HOY</div>
  </div>

  <div class="section">LPF ARGENTINA</div>
  <div id="lpf"></div>

  <div class="section">CONMEBOL LIBERTADORES</div>
  <div id="lib"></div>

  <div class="section">CONMEBOL SUDAMERICANA</div>
  <div id="sud"></div>

  <div class="footer">
    CONTRATÁ YA DIGITAL TV<br>
    Y NO TE PIERDAS NINGÚN PARTIDO
  </div>
</div>

<script>

/* ====== LISTAS DE EQUIPOS ====== */

// Libertadores 2026 (te la limpio: saco " (XXX)")
const equiposLib2026_raw = [

// Sudamericana 2026 (te la limpio: saco " (XXX)")

function stripCountrySuffix(name){
  // Quita " (XXX)" al final
  return (name || "").replace(/\s+\([A-Z]{3}\)\s*$/u, "").trim();
}

const equiposLib2026 = equiposLib2026_raw.map(stripCountrySuffix);
const equiposSud2026 = equiposSud2026_raw.map(stripCountrySuffix);

/* ====== ESCUDOS (online) ======
   Para LPF: pongo varios conocidos.
   Para el resto: algunos van a placeholder hasta que se ajusten URLs (ver lista al final).
*/

  // LPF (bastante completos, ajustables)
  "River Plate":"https://upload.wikimedia.org/wikipedia/commons/3/3f/Logo_River_Plate.png",
  "Boca Juniors":"https://upload.wikimedia.org/wikipedia/commons/1/1b/Boca_Juniors_logo18.png",

  "Defensa y Justicia":"https://upload.wikimedia.org/wikipedia/commons/1/16/Defensa_y_Justicia_logo.png",

  "Newell's Old Boys":"https://upload.wikimedia.org/wikipedia/commons/4/4f/Newells_Old_Boys_logo.png",
  "Argentinos Juniors":"https://upload.wikimedia.org/wikipedia/commons/3/3f/Argentinos_Juniors_logo.svg",
  "Huracán":"https://upload.wikimedia.org/wikipedia/commons/7/79/Escudo_del_Club_Atl%C3%A9tico_Hurac%C3%A1n.svg",
  "Atlético Tucumán":"https://upload.wikimedia.org/wikipedia/commons/9/9c/Escudo_del_Club_Atl%C3%A9tico_Tucum%C3%A1n.svg",
  "Banfield":"https://upload.wikimedia.org/wikipedia/commons/7/78/Banfield_logo.svg",
  "Platense":"https://upload.wikimedia.org/wikipedia/commons/4/48/Escudo_del_Club_Atl%C3%A9tico_Platense.svg",

  "Unión":"https://upload.wikimedia.org/wikipedia/commons/7/7c/Escudo_del_Club_Atl%C3%A9tico_Uni%C3%B3n.svg",
  "Belgrano":"https://upload.wikimedia.org/wikipedia/commons/4/4f/Escudo_del_Club_Atl%C3%A9tico_Belgrano.svg",
  "Instituto":"https://upload.wikimedia.org/wikipedia/commons/8/89/Escudo_del_Instituto_Atl%C3%A9tico_Central_C%C3%B3rdoba.svg",
  "Central Córdoba (SdE)":"https://upload.wikimedia.org/wikipedia/commons/5/57/Escudo_Central_C%C3%B3rdoba_de_Santiago_del_Estero.svg",
  "Barracas Central":"https://upload.wikimedia.org/wikipedia/commons/2/2b/Escudo_del_Club_Atl%C3%A9tico_Barracas_Central.svg",
  "Independiente Rivadavia":"https://upload.wikimedia.org/wikipedia/commons/2/2f/Escudo_del_Club_Independiente_Rivadavia.svg",
  "Estudiantes (LP)":"https://upload.wikimedia.org/wikipedia/commons/2/2e/Estudiantes_de_La_Plata_logo.png",

  // Algunos ejemplos fuera de LPF (muchos quedarán placeholder hasta ajustar)

};

function shieldUrl(team){
  return escudos[team] || PLACEHOLDER_SHIELD;
}

/* ====== DOM / SELECTS ====== */
const competition = document.getElementById("competition");
const team1 = document.getElementById("team1");
const team2 = document.getElementById("team2");

function listaPorCompetencia(comp){
  if (comp === "lpf") return equiposLPF2026;
  if (comp === "lib") return equiposLib2026;
  if (comp === "sud") return equiposSud2026;
  return [];
}

function recargarSelectsEquipos(){
  const comp = competition.value;
  const lista = listaPorCompetencia(comp).slice().sort((a,b)=>a.localeCompare(b,'es'));

  team1.innerHTML = "";
  team2.innerHTML = "";

  lista.forEach(e=>{
    team1.innerHTML += `<option>${e}</option>`;
    team2.innerHTML += `<option>${e}</option>`;
  });
}

competition.addEventListener("change", () => {
  recargarSelectsEquipos();
  limpiarFormulario();
});

// Inicial
recargarSelectsEquipos();

/* ====== HELPERS ====== */
function getHoraNormalizada(raw){
  const s = (raw || "").trim();
  if (/^\d{1,2}[:.]\d{2}$/.test(s)) return s.replace('.',':');
  if (/^\d{3,4}$/.test(s)) {
    const padded = s.padStart(4,'0');
    return padded.slice(0,2)+":"+padded.slice(2);
  }
  return "";
}

function getCanalesSeleccionados(){
  return [...document.querySelectorAll("input[type=checkbox]:checked")].map(c => c.value);
}

function limpiarFormulario(){
  document.getElementById("time").value = "";
  document.querySelectorAll("input[type=checkbox]").forEach(c=>c.checked=false);
}

function limpiarTodo(){
  ["lpf","lib","sud"].forEach(id=>document.getElementById(id).innerHTML="");
  limpiarFormulario();
}

/* ====== AGREGAR ====== */
function agregarDesdeFormulario(){
  const tipo = competition.value;
  const t1 = team1.value;
  const t2 = team2.value;
  const hora = getHoraNormalizada(document.getElementById("time").value);

  if (!t1 || !t2) { alert("Elegí los equipos."); return; }
  if (t1 === t2) { alert("Elegí dos equipos distintos."); return; }
  if (!hora) { alert("Ingresá una hora válida (ej: 19:00)."); return; }

  const canales = getCanalesSeleccionados();
  if (canales.length === 0) { alert("Elegí al menos un canal."); return; }

  const canalesHtml = canales.map(code => `<img alt="${code}" src="${logos[code]}">`).join("");

  const matchId = "m_" + Math.random().toString(16).slice(2);

  const html = `
  <div class="match" id="${matchId}" data-tipo="${tipo}" data-t1="${t1}" data-t2="${t2}" data-hora="${hora}" data-canales="${canales.join(',')}">

    <div class="team">
      <img alt="${t1}" src="${shieldUrl(t1)}" onerror="this.src='${PLACEHOLDER_SHIELD}'">
      <div>${t1}</div>
    </div>

    <div class="center">
      <div class="time">${hora} HS</div>
      <div class="vs">VS</div>
    </div>

    <div class="team">
      <img alt="${t2}" src="${shieldUrl(t2)}" onerror="this.src='${PLACEHOLDER_SHIELD}'">
      <div>${t2}</div>
    </div>

    <div class="channels">
      ${canalesHtml}
    </div>

    <div class="actions">
      <button class="edit" onclick="editar('${matchId}')">Editar</button>
      <button class="del" onclick="eliminar('${matchId}')">Borrar</button>
    </div>

  </div>
  `;

  document.getElementById(tipo).innerHTML += html;
  limpiarFormulario();
}

function eliminar(id){
  const el = document.getElementById(id);
  if (el) el.remove();
}

function editar(id){
  const el = document.getElementById(id);
  if (!el) return;

  const tipo = el.getAttribute("data-tipo");
  const t1 = el.getAttribute("data-t1");
  const t2 = el.getAttribute("data-t2");
  const hora = el.getAttribute("data-hora");
  const canales = (el.getAttribute("data-canales") || "").split(",").filter(Boolean);

  competition.value = tipo;
  recargarSelectsEquipos();

  team1.value = t1;
  team2.value = t2;
  document.getElementById("time").value = hora;

  document.querySelectorAll("input[type=checkbox]").forEach(c=>{
    c.checked = canales.includes(c.value);
  });

  if (confirm("Reemplazar este partido con los valores del formulario?")) {
    eliminar(id);
    agregarDesdeFormulario();
  }
}

/* ====== DESCARGAR ====== */
function descargar(){
  html2canvas(document.getElementById("flyer"), {backgroundColor: null}).then(canvas=>{
    const link=document.createElement("a");
    link.download="flyer.png";
    link.href=canvas.toDataURL("image/png");
    link.click();
  });
}
</script>
